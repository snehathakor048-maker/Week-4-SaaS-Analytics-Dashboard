<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaaS Analytics Dashboard</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="dashboard">

<!-- SIDEBAR -->
<aside class="sidebar">
<h2 class="logo">SATIC</h2>

<ul class="menu">
<li class="active">Dashboard</li>
<li>Analytics</li>
<li>Users</li>
<li>Reports</li>
<li>Settings</li>
</ul>
</aside>

<!-- MAIN -->
<main class="main">

<!-- TOPBAR -->
<div class="topbar">
<input type="text" placeholder="Search...">

<div class="user">
<button id="themeToggle">🌙</button>
<img src="https://i.pravatar.cc/40">
</div>
</div>

<!-- CARDS -->
<section class="cards">
<div class="card"><h3>Revenue</h3><p>$24,300</p></div>
<div class="card"><h3>Users</h3><p>1,240</p></div>
<div class="card"><h3>Orders</h3><p>560</p></div>
<div class="card"><h3>Growth</h3><p>+18%</p></div>
</section>

<!-- CHART -->
<section class="chart-container">
<h3>Revenue Overview</h3>
<canvas id="revenueChart"></canvas>
</section>

<!-- FILTER -->
<select id="statusFilter">
<option value="all">All</option>
<option value="active">Active</option>
<option value="pending">Pending</option>
<option value="churned">Churned</option>
</select>

<!-- TABLE -->
<section class="table-container">
<h3>Users Overview</h3>

<table>
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Revenue</th>
<th>Status</th>
<th>Last Login</th>
</tr>
</thead>

<tbody id="tableData"></tbody>
</table>

</section>

</main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
